<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KI Academy – Christel Media</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Figtree:ital,wght@0,300;0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#070C17;--s1:#0C1524;--s2:#101C30;--s3:#152238;
  --b:#1A2D44;--bl:#203550;
  --accent:#00CEAC;--ah:#00E5C0;
  --amber:#F59E0B;--ambg:rgba(245,158,11,.12);
  --t1:#EDF2F7;--t2:#8BA3BE;--t3:#4A6582;
  --m1:#00CEAC;--m2:#818CF8;--m3:#F59E0B;--m4:#F87171;--m5:#A78BFA;
  --sw:280px;--r:12px;--rs:8px;
}
html{scroll-behavior:smooth}
body{
  font-family:"Figtree",sans-serif;background:var(--bg);color:var(--t1);
  min-height:100vh;overflow-x:hidden;font-size:15px;line-height:1.65;
  background-image:radial-gradient(circle,rgba(255,255,255,.04) 1px,transparent 1px);
  background-size:28px 28px;
}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--s1)}
::-webkit-scrollbar-thumb{background:var(--bl);border-radius:3px}
.app{display:flex;min-height:100vh}
.sidebar{
  width:var(--sw);min-width:var(--sw);height:100vh;position:sticky;top:0;
  background:var(--s1);border-right:1px solid var(--b);
  display:flex;flex-direction:column;overflow-y:auto;overflow-x:hidden;
  transition:transform .3s ease;z-index:100;
}
.logo{padding:24px 20px 20px;border-bottom:1px solid var(--b)}
.logo-title{font-family:"Syne",sans-serif;font-weight:800;font-size:18px;color:var(--t1);letter-spacing:-.3px}
.logo-title span{color:var(--accent)}
.logo-sub{font-size:11px;color:var(--t3);margin-top:2px;letter-spacing:.5px;text-transform:uppercase}
.sidebar-nav{flex:1;padding:12px 0}
.mod-btn{
  width:100%;background:none;border:none;cursor:pointer;text-align:left;
  padding:10px 20px;display:flex;align-items:center;gap:12px;
  transition:background .2s;border-left:3px solid transparent;
}
.mod-btn:hover{background:rgba(255,255,255,.04)}
.mod-btn.active{background:rgba(255,255,255,.06)}
.mod-btn.active .mod-title{color:var(--t1)}
.ring-wrap{position:relative;width:38px;height:38px;flex-shrink:0}
.ring-wrap svg{position:absolute;top:0;left:0;transform:rotate(-90deg)}
.ring-bg{fill:none;stroke:var(--bl);stroke-width:2.5}
.ring-fg{fill:none;stroke-width:2.5;stroke-linecap:round;transition:stroke-dashoffset .8s ease}
.ring-num{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-family:"Syne",sans-serif;font-weight:700;font-size:11px;
}
.mod-info{flex:1;min-width:0}
.mod-title{font-family:"Syne",sans-serif;font-weight:600;font-size:13px;color:var(--t2);transition:color .2s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mod-meta{font-size:11px;color:var(--t3);margin-top:1px}
.sidebar-footer{padding:16px 20px;border-top:1px solid var(--b)}
.overall-label{font-size:11px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.overall-bar{height:4px;background:var(--bl);border-radius:2px;overflow:hidden}
.overall-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .6s ease;width:0%}
.overall-count{font-size:12px;color:var(--t2);margin-top:6px}
.main{flex:1;min-width:0;overflow-y:auto}
.welcome{
  max-width:680px;margin:80px auto;padding:0 32px;text-align:center;
  animation:fadeUp .6s ease both;
}
.welcome-hero{font-family:"Syne",sans-serif;font-weight:800;font-size:90px;color:var(--accent);opacity:.12;line-height:1;margin-bottom:-16px;letter-spacing:-4px}
.welcome h1{font-family:"Syne",sans-serif;font-weight:800;font-size:32px;margin-bottom:12px}
.welcome p{color:var(--t2);font-size:16px;max-width:480px;margin:0 auto}
.welcome-cards{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-top:44px}
.wcard{
  background:var(--s2);border:1px solid var(--b);border-radius:var(--r);
  padding:16px 12px;cursor:pointer;transition:all .2s;text-align:center;
}
.wcard:hover{transform:translateY(-3px);border-color:var(--bl)}
.wcard-icon{font-size:22px;margin-bottom:8px}
.wcard-num{font-family:"Syne",sans-serif;font-weight:700;font-size:10px;color:var(--t3);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.wcard-title{font-family:"Syne",sans-serif;font-weight:600;font-size:12px;color:var(--t1);line-height:1.3}
.module-view{max-width:760px;margin:0 auto;padding:40px 32px 80px;animation:fadeUp .35s ease both}
.mod-hero{margin-bottom:32px;border-radius:var(--r);padding:32px;background:var(--s1);border:1px solid var(--b)}
.hero-num{font-family:"Syne",sans-serif;font-weight:800;font-size:68px;line-height:1;opacity:.14;margin-bottom:6px}
.hero-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.hero-title{font-family:"Syne",sans-serif;font-weight:800;font-size:26px;line-height:1.2;margin-bottom:6px}
.hero-sub{color:var(--t2);font-size:14.5px;margin-bottom:14px}
.hero-meta{display:flex;gap:16px;flex-wrap:wrap}
.hero-meta span{font-size:12.5px;color:var(--t3)}
.mod-pbar{height:3px;background:var(--bl);border-radius:2px;margin-top:14px;overflow:hidden}
.mod-pfill{height:100%;border-radius:2px;transition:width .5s ease}
.sec-label{font-family:"Syne",sans-serif;font-weight:700;font-size:12px;color:var(--t3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:14px}
.lcard{
  background:var(--s1);border:1px solid var(--b);border-radius:var(--r);
  margin-bottom:8px;overflow:hidden;transition:border-color .2s;
}
.lcard:hover{border-color:var(--bl)}
.lcard.open{border-color:var(--bl)}
.lcard-hdr{
  display:flex;align-items:center;gap:14px;padding:15px 20px;
  cursor:pointer;user-select:none;
}
.lnum{
  width:28px;height:28px;border-radius:50%;background:var(--s3);
  display:flex;align-items:center;justify-content:center;
  font-family:"Syne",sans-serif;font-weight:700;font-size:11px;color:var(--t3);
  flex-shrink:0;transition:all .2s;
}
.lcard.done .lnum{background:var(--accent);color:#000}
.ltitle{font-family:"Syne",sans-serif;font-weight:600;font-size:14px;flex:1}
.lcheck{font-size:15px;opacity:0;transition:opacity .2s;color:var(--accent)}
.lcard.done .lcheck{opacity:1}
.lchevron{font-size:11px;color:var(--t3);transition:transform .3s}
.lcard.open .lchevron{transform:rotate(180deg)}
.lbody{max-height:0;overflow:hidden;transition:max-height .4s ease}
.lcard.open .lbody{max-height:2600px}
.lcontent{padding:2px 20px 22px;border-top:1px solid var(--b)}
.lcontent p{color:var(--t2);margin-top:14px;font-size:14.5px}
.lcontent strong{color:var(--t1)}
.lcontent h4{font-family:"Syne",sans-serif;font-weight:700;font-size:12.5px;color:var(--t1);margin-top:20px;margin-bottom:8px;text-transform:uppercase;letter-spacing:.3px}
.kp{list-style:none}
.kp li{color:var(--t2);font-size:14px;padding:5px 0 5px 22px;position:relative}
.kp li::before{content:"→";position:absolute;left:0;color:var(--accent);font-size:11px;top:7px}
.tipbox{
  background:var(--ambg);border:1px solid rgba(245,158,11,.2);border-radius:var(--rs);
  padding:12px 16px;margin-top:16px;font-size:13.5px;color:var(--amber);
  display:flex;gap:10px;align-items:flex-start;
}
.tipbox::before{content:"💡";flex-shrink:0;margin-top:1px}
.ctable{width:100%;border-collapse:collapse;margin-top:12px;font-size:13px}
.ctable th{background:var(--s3);padding:9px 12px;text-align:left;font-family:"Syne",sans-serif;font-weight:600;font-size:11px;color:var(--t2);text-transform:uppercase;letter-spacing:.3px;border:1px solid var(--b)}
.ctable td{padding:8px 12px;border:1px solid var(--b);color:var(--t2)}
.ctable tr:nth-child(even) td{background:rgba(255,255,255,.02)}
.ctable .hi{color:var(--accent);font-weight:600}
.pblock{position:relative;margin-top:16px}
.plabel{font-size:11px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px;font-family:"Syne",sans-serif;font-weight:600}
.pcode{
  background:#040A14;border:1px solid var(--b);border-radius:var(--rs);
  padding:14px 48px 14px 14px;font-family:"JetBrains Mono",monospace;font-size:12px;
  color:#7EE7C0;line-height:1.65;white-space:pre-wrap;word-break:break-word;display:block;
}
.cpbtn{
  position:absolute;top:26px;right:10px;background:var(--s3);border:1px solid var(--bl);
  color:var(--t2);font-size:11px;padding:4px 9px;border-radius:5px;cursor:pointer;
  font-family:"Figtree",sans-serif;transition:all .2s;white-space:nowrap;
}
.cpbtn:hover{background:var(--bl);color:var(--t1)}
.cpbtn.ok{background:var(--accent);color:#000;border-color:var(--accent)}
.donebt{
  margin-top:20px;padding:8px 18px;background:transparent;border:1px solid var(--bl);
  color:var(--t2);border-radius:var(--rs);cursor:pointer;font-size:13px;
  font-family:"Figtree",sans-serif;transition:all .2s;
}
.donebt:hover{background:var(--s3);color:var(--t1)}
.lcard.done .donebt{background:var(--accent);color:#000;border-color:var(--accent)}
.quiz-sec{margin-top:40px}
.quiz-hdr{
  background:var(--s1);border:1px solid var(--b);border-radius:var(--r);
  padding:22px 26px;margin-bottom:18px;display:flex;align-items:center;gap:14px;
}
.qz-icon{font-size:28px}
.qz-h2{font-family:"Syne",sans-serif;font-weight:800;font-size:19px}
.qz-desc{color:var(--t2);font-size:13px;margin-top:2px}
.qcard{background:var(--s1);border:1px solid var(--b);border-radius:var(--r);padding:26px;animation:fadeUp .3s ease both}
.qnum{font-size:11px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;font-family:"Syne",sans-serif;font-weight:600;margin-bottom:7px}
.qtext{font-family:"Syne",sans-serif;font-weight:600;font-size:16px;line-height:1.4;margin-bottom:18px}
.qopts{display:grid;gap:9px}
.qopt{
  background:var(--s2);border:1px solid var(--b);border-radius:var(--rs);
  padding:12px 15px;cursor:pointer;font-size:14px;color:var(--t1);
  transition:all .2s;text-align:left;width:100%;font-family:"Figtree",sans-serif;
  display:flex;align-items:center;gap:11px;
}
.qopt:hover:not(:disabled){background:var(--s3);border-color:var(--bl)}
.qopt.correct{background:rgba(16,185,129,.1);border-color:rgba(16,185,129,.4);color:#6EE7B7}
.qopt.wrong{background:rgba(239,68,68,.1);border-color:rgba(239,68,68,.4);color:#FCA5A5;animation:shake .4s ease}
.qopt:disabled{cursor:default}
.oletter{
  width:25px;height:25px;border-radius:50%;background:var(--s3);border:1px solid var(--bl);
  display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;
  flex-shrink:0;font-family:"Syne",sans-serif;transition:all .2s;
}
.qopt.correct .oletter{background:rgba(16,185,129,.3);border-color:#10B981;color:#6EE7B7}
.qopt.wrong .oletter{background:rgba(239,68,68,.3);border-color:#EF4444;color:#FCA5A5}
.qfb{margin-top:13px;padding:11px 15px;border-radius:var(--rs);font-size:13.5px;display:none}
.qfb.show{display:block;animation:fadeUp .3s ease}
.qfb.ok{background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.2);color:#6EE7B7}
.qfb.nope{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);color:#FCA5A5}
.qnxt{
  margin-top:14px;padding:10px 22px;background:var(--accent);color:#000;border:none;
  border-radius:var(--rs);cursor:pointer;font-size:14px;font-weight:600;
  font-family:"Syne",sans-serif;transition:all .2s;display:none;
}
.qnxt.show{display:inline-flex;align-items:center;gap:5px}
.qnxt:hover{background:var(--ah)}
.qdots{display:flex;gap:6px;margin-bottom:16px;justify-content:center}
.qdot{width:7px;height:7px;border-radius:50%;background:var(--bl);transition:all .3s}
.qdot.done{background:var(--accent)}
.qdot.cur{background:var(--t2);transform:scale(1.3)}
.qresult{text-align:center;padding:36px 20px;animation:fadeUp .4s ease both}
.rscore{font-family:"Syne",sans-serif;font-weight:800;font-size:60px;line-height:1;margin-bottom:6px}
.rlabel{font-size:15px;color:var(--t2);margin-bottom:20px}
.rstars{font-size:26px;letter-spacing:4px;margin-bottom:18px}
.retrybt{
  padding:9px 22px;background:transparent;border:1px solid var(--bl);color:var(--t2);
  border-radius:var(--rs);cursor:pointer;font-size:14px;font-family:"Figtree",sans-serif;
  transition:all .2s;margin-right:8px;
}
.retrybt:hover{background:var(--s3);color:var(--t1)}
.hamburger{
  display:none;position:fixed;top:16px;left:16px;z-index:200;
  background:var(--s1);border:1px solid var(--b);border-radius:var(--rs);
  padding:10px;cursor:pointer;
}
.hamburger span{display:block;width:20px;height:2px;background:var(--t1);margin:4px 0;transition:all .3s}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:99}
.overlay.show{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}
@media(max-width:768px){
  .sidebar{position:fixed;left:0;top:0;transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .main{padding-top:58px}
  .module-view{padding:20px 16px 60px}
  .hamburger{display:block}
  .welcome-cards{grid-template-columns:repeat(2,1fr)}
  .welcome{margin:36px auto;padding:0 16px}
  .welcome h1{font-size:24px}
  .welcome-hero{font-size:60px}
  .hero-num{font-size:48px}
  .hero-title{font-size:22px}
  .mod-hero{padding:22px}
}
</style>
</head>
<body>
<button class="hamburger" id="ham" onclick="toggleSidebar()" aria-label="Menü">
  <span></span><span></span><span></span>
</button>
<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>
<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="logo">
      <div class="logo-title">KI <span>Academy</span></div>
      <div class="logo-sub">by Christel Media</div>
    </div>
    <nav class="sidebar-nav" id="sidebarNav"></nav>
    <div class="sidebar-footer">
      <div class="overall-label">Gesamtfortschritt</div>
      <div class="overall-bar"><div class="overall-fill" id="overallFill"></div></div>
      <div class="overall-count" id="overallCount">0 / 25 Lektionen</div>
    </div>
  </aside>
  <main class="main" id="main">
    <div id="content"></div>
  </main>
</div>
<script>
const C2PI = 2*Math.PI*14;

// All lesson content is static, author-controlled — no user input rendered as HTML
const MODS = [
{id:1,color:"#00CEAC",icon:"⚡",title:"KI-Grundlagen",sub:"Wie funktioniert KI und wie bringt man sie zum Arbeiten?",
lessons:[
{id:"1-1",t:"Was ist Künstliche Intelligenz?",c:'<p>KI bezeichnet Computersysteme, die Aufgaben ausführen, die normalerweise menschliche Intelligenz erfordern. Moderne KI basiert auf <strong>Machine Learning (ML)</strong> – Algorithmen, die aus Daten lernen, anstatt explizit programmiert zu werden.</p><p><strong>Deep Learning</strong> nutzt neuronale Netze mit vielen Schichten. <strong>Large Language Models (LLMs)</strong> wie ChatGPT und Claude wurden auf riesigen Textmengen trainiert und lernen, welches Wort statistisch am wahrscheinlichsten folgt.</p><p>KI ist kein magisches Wesen. Es ist hochentwickelte Statistik über Milliarden von Textbeispielen, kombiniert mit menschlichem Feedback-Training (RLHF).</p><h4>Wichtige Punkte</h4><ul class="kp"><li>Machine Learning ≠ Deep Learning ≠ Generative KI (aber alle verwandt)</li><li>LLMs sind der Kern von ChatGPT, Claude und Gemini</li><li>Halluzinationen sind systembedingt – kein Bug, sondern Eigenschaft</li><li>RLHF macht Modelle hilfreicher und sicherer</li></ul><div class="tipbox">Stell dir LLMs vor wie einen extrem gut belesenen Mitarbeiter, der manchmal selbstbewusst falsche Dinge behauptet. Immer nachprüfen!</div>'},
{id:"1-2",t:"Wie funktionieren LLMs?",c:'<p>LLMs werden in zwei Phasen trainiert: <strong>Pre-Training</strong> (riesige Textmengen, Ziel: nächstes Wort vorhersagen) und <strong>Fine-Tuning/RLHF</strong> – das Modell wird auf hilfreiche, sichere Antworten trainiert.</p><p>Der <strong>Context Window</strong> ist der maximale Text, den ein Modell gleichzeitig verarbeiten kann. GPT-4: ~128k Tokens. Claude 3.5: ~200k Tokens. 1 Token ≈ 0,75 Wörter.</p><p><strong>Halluzinationen</strong> entstehen, weil das Modell immer eine plausibel klingende Antwort generiert – auch wenn es die Antwort nicht kennt.</p><h4>Wichtige Punkte</h4><ul class="kp"><li>1 Token ≈ 0,75 Wörter · 1.000 Tokens ≈ 750 Wörter</li><li>Längerer Kontext = bessere Ergebnisse, aber teurer</li><li>Temperatur 0 = deterministisch · 1 = kreativ/unvorhersehbar</li><li>Kein Gedächtnis über Gespräche hinaus (ohne Speicherfunktion)</li></ul>'},
{id:"1-3",t:"ChatGPT vs. Claude vs. Gemini",c:'<p>Die drei großen KI-Assistenten haben verschiedene Stärken. Kein Tool ist in allem am besten.</p><table class="ctable"><tr><th>Tool</th><th>Stärken</th><th>Ideal für</th></tr><tr><td><strong>ChatGPT</strong></td><td>Code, Bildgenerierung (DALL-E), Plugin-Ökosystem</td><td class="hi">Programmierung, Bildgenerierung, Allrounder</td></tr><tr><td><strong>Claude</strong></td><td>200k Context Window, präzise Analysen, nuanciertes Schreiben</td><td class="hi">Lange Dokumente, Vertragsanalyse, Kundenkommunikation</td></tr><tr><td><strong>Gemini</strong></td><td>Google-Ecosystem (Docs, Gmail, Drive), Websuche+KI</td><td class="hi">Google Workspace-Nutzer, Recherche</td></tr></table><h4>Wichtige Punkte</h4><ul class="kp"><li>Claude hat das größte Context Window (200k ≈ 150.000 Wörter!)</li><li>ChatGPT hat das größte Plugin/GPT-Ökosystem</li><li>Gemini beste Wahl für Google-Workspace-Nutzer</li><li>Enterprise-Versionen für DSGVO-sensible Aufgaben nutzen</li></ul><div class="pblock"><div class="plabel">Prompt-Beispiel: Tool-Vergleich</div><pre class="pcode">Vergleiche [Tool A] mit [Tool B] fuer den Anwendungsfall [deine Aufgabe].\nBeruecksichtige: Genauigkeit, Kosten, Datenschutz, Integrations-\nmoeglichkeiten. Gib eine klare Empfehlung fuer unser Team.</pre><button class="cpbtn" onclick="copyP(this)">Kopieren</button></div>'},
{id:"1-4",t:"Prompt Engineering Grundlagen",c:'<p>Ein guter Prompt enthält vier Elemente – die <strong>RCTF-Formel</strong>: <strong>R</strong>olle + <strong>C</strong>ontext + <strong>T</strong>ask + <strong>F</strong>ormat.</p><p><strong>Schlechter Prompt:</strong> "Schreib einen Text über Marketing"<br><strong>Guter Prompt:</strong> "Du bist ein B2B-Marketing-Texter. Schreibe für IT-Entscheider einen LinkedIn-Post (max. 300 Zeichen) über ROI von Marketing-Automatisierung. Ton: professionell, mit konkreter Zahl."</p><h4>Wichtige Punkte</h4><ul class="kp"><li>Konkret statt vage: "300 Wörter" statt "kurz"</li><li>Kontext zur Zielgruppe immer angeben</li><li>Gewünschten Ton definieren</li><li>Beispiel zeigen: "Schreibe ähnlich wie..."</li><li>Iteration: Erster Versuch selten perfekt – verfeinern!</li></ul><div class="pblock"><div class="plabel">RCTF-Vorlage</div><pre class="pcode">ROLLE: Du bist ein [Experte/Rolle].\nKONTEXT: [Hintergrundinformationen, Zielgruppe, Branche].\nAUFGABE: [Konkrete Aufgabe mit Details].\nFORMAT: [Laenge, Struktur, Ton, Stil].</pre><button class="cpbtn" onclick="copyP(this)">Kopieren</button></div>'},
{id:"1-5",t:"Typische Fehler & wie man sie vermeidet",c:'<p>Diese fünf Fehler begegnen beim KI-Einstieg am häufigsten.</p><h4>Die 5 häufigsten Fehler</h4><ul class="kp"><li><strong>Ergebnisse ungeprüft übernehmen:</strong> LLMs halluzinieren. Fakten, Links und Zahlen immer verifizieren.</li><li><strong>Vertrauliche Daten eingeben:</strong> Kundendaten gehören nicht in Cloud-KI ohne DSGVO-Prüfung (→ Modul 4).</li><li><strong>Zu vage Prompts:</strong> "Schreib was über Marketing" führt zu generischem Output. RCTF anwenden.</li><li><strong>KI nur einmal fragen:</strong> Wenn die erste Antwort nicht passt, verfeinern und iterieren.</li><li><strong>Falsche Tool-Wahl:</strong> Code → GitHub Copilot · Lange Docs → Claude · Recherche → Perplexity.</li></ul><div class="tipbox">"Trust but verify" – bei Zahlen, Zitaten und Quellenangaben immer nachprüfen. KI halluziniert routinemäßig.</div>'},
],
quiz:[
{q:"Was ist ein 'Token' im Kontext von LLMs?",o:["Eine Einheit der Rechenleistung","Die kleinste Textverarbeitungseinheit, ca. ¾ eines Wortes","Eine Sicherheitszertifizierung","Ein Bezahlsystem für KI-Dienste"],c:1,f:["Fast! Token sind Texteinheiten.","Genau! 1 Token ≈ 0,75 Wörter. 1.000 Token ≈ 750 Wörter.","Leider falsch.","Leider falsch."]},
{q:"Was versteht man unter einer 'Halluzination' bei KI?",o:["Die KI wird kreativ","Ein behebbarer Trainingsfehler","Die KI generiert selbstbewusst klingende, aber falsche Informationen","Die KI verweigert Antworten"],c:2,f:["Nicht ganz – Halluzinationen sind systembedingt.","Leider nein – strukturell, kein behebbarer Bug.","Richtig! LLMs erzeugen immer plausibel klingende Antworten – auch ohne das Richtige zu 'wissen'.","Nicht ganz."]},
{q:"Welches Tool eignet sich am besten für 100+ Seiten Dokumente?",o:["ChatGPT mit GPT-3.5","Zapier AI","Claude von Anthropic (200k Token Context)","Gemini Nano"],c:2,f:["Zu kleines Context Window.","Kein Dokumentenanalyse-Tool.","Perfekt! Claude hat das größte Context Window – ideal für lange Dokumente.","Kleines On-Device-Modell."]},
{q:"Was steht hinter der RCTF-Formel?",o:["Rate, Check, Test, Finalize","Role, Context, Task, Format","Research, Create, Transform, Follow-up","Repeat, Clarify, Tone, Feedback"],c:1,f:["Leider falsch.","Exakt! Rolle + Kontext + Aufgabe + Format = effektiver Prompt.","Leider falsch.","Leider falsch."]},
{q:"Welcher Fehler ist beim KI-Einsatz am gefährlichsten?",o:["Zu kurze Prompts","Falsche Tool-Wahl","Personenbezogene Kundendaten in Cloud-KI eingeben","Mehrmals nachfragen"],c:2,f:["Ärgerlich, kein Sicherheitsrisiko.","Kostet Zeit, kein Datenschutzrisiko.","Korrekt! Personenbezogene Daten = DSGVO-Risiko mit erheblichen Bußgeldern.","Mehrmals nachfragen ist sogar empfohlen!"]},
]},

{id:2,color:"#818CF8",icon:"💬",title:"ChatGPT & Claude im Alltag",sub:"Praktische Anwendungen für sofortige Zeitersparnis",
lessons:[
{id:"2-1",t:"E-Mails schreiben & optimieren",c:'<p>E-Mail-Kommunikation frisst im Durchschnitt 2,5 Stunden pro Arbeitstag. Mit KI auf unter eine Stunde – ohne Qualitätsverlust.</p><p><strong>Drei Kern-Anwendungsfälle:</strong> (1) E-Mail von Grund auf schreiben, (2) bestehende E-Mail verbessern (Ton, Kürze), (3) auf schwierige E-Mails deeskalierend antworten.</p><h4>Wichtige Punkte</h4><ul class="kp"><li>5 Min/E-Mail × 20 E-Mails/Tag = 100 Min täglich gespart</li><li>Ton-Anpassung ist oft wertvoller als das reine Schreiben</li><li>KI kann emotional schwierige E-Mails professionell deeskalieren</li><li>Immer finale Kontrolle und persönliche Note hinzufügen</li></ul><div class="pblock"><div class="plabel">E-Mail-Prompt-Vorlage</div><pre class="pcode">Schreibe eine professionelle E-Mail:\n- Empfaenger: [Name, Rolle, Unternehmen]\n- Beziehung: [Neu/Bestehend, formell/informell]\n- Zweck: [Was soll erreicht werden?]\n- Ton: [z.B. professionell, warmherzig, direkt]\n- Wichtige Punkte: [Kernaussagen als Bullets]\n- Laenge: max. [X] Saetze + klarer Call-to-Action</pre><button class="cpbtn" onclick="copyP(this)">Kopieren</button></div>'},
{id:"2-2",t:"Content-Erstellung für Social Media & Blog",c:'<p>KI beschleunigt Content-Erstellung dramatisch – aber nur als <strong>Co-Pilot, nicht als Autopilot</strong>. Deine Brand Voice und Erfahrungen bleiben unersetzbar.</p><p><strong>Blog-Workflow:</strong> Thema + SEO-Keyword → KI-Outline → anpassen → Abschnitte ausschreiben → eigene Beispiele einarbeiten → finale Redaktion.</p><h4>Wichtige Punkte</h4><ul class="kp"><li>Briefing-Qualität = Output-Qualität (Garbage in, garbage out)</li><li>Eigene Expertise immer einarbeiten</li><li>Plattformspezifische Prompts: LinkedIn ≠ Instagram ≠ Twitter/X</li><li>KI als Strukturhilfe und Formulierungsassistent</li></ul><div class="pblock"><div class="plabel">LinkedIn-Post-Vorlage</div><pre class="pcode">Schreibe einen LinkedIn-Post:\nThema: [THEMA]\nZielgruppe: [Wer soll es lesen?]\nMeine Kernaussage: [Dein einzigartiger Standpunkt]\nTon: professionell, direkt, ueberraschende Erkenntnis am Anfang\nFormat: Aufhaenger → 3-4 Absaetze → 3 Learnings → CTA\nLaenge: ~250 Woerter | Hashtags: 3-5</pre><button class="cpbtn" onclick="copyP(this)">Kopieren</button></div>'},
{id:"2-3",t:"Datenanalyse & Recherche",c:'<p>ChatGPT (GPT-4o) und Claude können CSV, Excel und PDFs analysieren – ohne SQL oder Python-Kenntnisse.</p><p>Für Recherchen: <strong>Perplexity.ai</strong> gibt echte, aktuelle Quellen an. Claude ist hervorragend für das Zusammenfassen langer Berichte und Verträge.</p><h4>Wichtige Punkte</h4><ul class="kp"><li>Upload: CSV, PDF, DOCX direkt in ChatGPT/Claude laden</li><li>Klare Analysefrage: "Welche 3 Trends siehst du in diesen Daten?"</li><li>Visualisierungen anfragen: "Erstelle ein Diagramm der Top-10-Produkte"</li><li>Fakten-Recherche: immer Quellen verlangen ("Cite your sources")</li></ul><div class="pblock"><div class="plabel">Datenanalyse-Prompt</div><pre class="pcode">Ich lade dir eine CSV-Datei mit Verkaufsdaten hoch.\nAnalysiere bitte:\n1. Top 3 Produkte nach Umsatz in Q4?\n2. Saisonale Muster?\n3. Kundengruppe mit hoechstem Umsatz?\n4. Deine 3 wichtigsten Empfehlungen?\nAntwort strukturiert mit Ueberschriften.</pre><button class="cpbtn" onclick="copyP(this)">Kopieren</button></div>'},
{id:"2-4",t:"Custom Instructions & System Prompts",c:'<p><strong>Custom Instructions</strong> (ChatGPT) und <strong>Claude Projects</strong> stellen KI dauerhaft auf deine Bedürfnisse ein – kein Neu-Briefing bei jeder Anfrage.</p><p><strong>ChatGPT:</strong> Einstellungen → "Benutzerdefinierte Anweisungen". Zwei Felder: Was soll ChatGPT wissen? + Wie soll es antworten?</p><p><strong>Claude Projects:</strong> Project erstellen → Systemanweisungen + Dokumente hochladen → dauerhafter Unternehmenskontext.</p><h4>Wichtige Punkte</h4><ul class="kp"><li>Brand Voice, Tonalität und Kerninfos einprogrammieren</li><li>Claude Projects ideal für teamübergreifende KI-Assistenten</li><li>Regelmäßig aktualisieren wenn sich Kontext ändert</li></ul><div class="pblock"><div class="plabel">Custom Instructions Vorlage</div><pre class="pcode">=== WAS DU UEBER MICH WISSEN SOLLTEST ===\nIch bin [Name], [Rolle] bei [Unternehmen].\nWir sind [Branche] mit Fokus auf [Spezialisierung].\nZielgruppe: [Beschreibung]\n\n=== WIE DU ANTWORTEN SOLLST ===\nTon: Professionell, direkt, ohne Floskeln\nSprache: Deutsch (Fachbegriffe auf Englisch okay)\nFormat: Strukturiert mit Ueberschriften + Bullets\nNie: "Natuerlich!" oder "Gerne!"</pre><button class="cpbtn" onclick="copyP(this)">Kopieren</button></div>'},
{id:"2-5",t:"Deine persönliche Prompt-Bibliothek",c:'<p>Eine Prompt-Bibliothek ist eine Sammlung getesteter Vorlagen für wiederkehrende Aufgaben. Spart täglich Zeit – auch für Teammitglieder.</p><p><strong>Aufbau in Notion oder Google Docs:</strong> Kategorien (E-Mail, Content, Analyse, Kundenservice). Pro Prompt: Titel, Text, Anwendungsfall, Beispiel-Output, letzte Aktualisierung.</p><h4>Wichtige Punkte</h4><ul class="kp"><li>Beginne mit 10 Prompts für die häufigsten Aufgaben</li><li>Teile die Bibliothek mit dem Team</li><li>Prompts iterativ verbessern – Version-Tracking hilft</li><li>Quartalsweise reviewen und aktualisieren</li></ul><div class="tipbox">Starte sofort: Schreibe heute 3 Prompts für deine drei häufigsten Aufgaben. Das ist der Anfang deiner Prompt-Bibliothek.</div>'},
],
quiz:[
{q:"Was ist für einen guten E-Mail-Prompt am wichtigsten?",o:["Die Länge der E-Mail","Empfänger, Ton und Ziel","Die gewünschte Schriftart","Das Versanddatum"],c:1,f:["Länge ist weniger entscheidend als das Ziel.","Richtig! Empfänger + Ton + Ziel sind die drei Kernelemente.","Schriftart ist irrelevant.","Das Versanddatum ist inhaltlich nicht relevant."]},
{q:"Wofür eignet sich Claude besonders gut?",o:["Bildgenerierung aus Text","Analyse sehr langer Dokumente dank 200k Token Context","Echtzeit-Websuche mit Quellenangaben","Video-Transkription"],c:1,f:["Claude generiert keine Bilder.","Korrekt! 200k Token Context Window = bestes Tool für Verträge und lange Dokumente.","Dafür ist Perplexity.ai besser.","Claude macht keine Video-Bearbeitung."]},
{q:"Was bedeutet 'Garbage in, garbage out'?",o:["KI produziert immer schlechten Output","Schlechte Prompts führen zu schlechten Ergebnissen","KI kann keine Fehler korrigieren","KI-Content ist grundsätzlich minderwertig"],c:1,f:["KI kann sehr gut sein – bei gutem Input.","Exakt! Prompt-Qualität bestimmt Output-Qualität.","KI kann Fehler korrigieren bei entsprechendem Prompt.","KI-Content kann hervorragend sein."]},
{q:"Was sind 'Custom Instructions' in ChatGPT?",o:["Kostenpflichtige Premium-Funktionen","Dauerhafte Einstellungen für jede Interaktion","Anweisungen zum Debuggen","Spracheinstellungen der UI"],c:1,f:["Custom Instructions sind kostenlos.","Richtig! Dauerhafte Personalisierungen – kein Neu-Briefing nötig.","Für Debugging andere Tools.","Separat von den Spracheinstellungen."]},
{q:"Wie sollte eine Prompt-Bibliothek strukturiert sein?",o:["Alphabetisch nach Länge","Nach Kategorien mit Anwendungsfall und Beispiel-Output","Als tägliches Journal","Als geheimes Einzeldokument"],c:1,f:["Nicht praxistauglich.","Perfekt! Kategorien + Anwendungsfall + Beispiel-Output = teamfähig und nützlich.","Kein gutes Format für eine Bibliothek.","Prompt-Bibliotheken wirken am besten geteilt."]},
]},

{id:3,color:"#F59E0B",icon:"🔗",title:"No-Code-Automatisierung",sub:"Workflows mit n8n, Make & Zapier",
lessons:[
{id:"3-1",t:"Was ist Workflow-Automatisierung?",c:'<p>Workflow-Automatisierung verbindet Apps, sodass sie automatisch miteinander kommunizieren. Grundprinzip: <strong>Trigger → Bedingung → Aktion</strong>.</p><p><strong>Beispiel:</strong> Lead-E-Mail eingeht (Trigger) → Betreff enthält "Anfrage" (Bedingung) → CRM-Eintrag + Slack-Nachricht + Follow-up planen (Aktionen).</p><p>Wissensarbeiter verbringen <strong>40% ihrer Zeit</strong> mit repetitiven Aufgaben. Selbst wenn 50% automatisierbar sind, gewinnst du 20% mehr Kapazität.</p><h4>Wichtige Punkte</h4><ul class="kp"><li>Beginne mit den 3 zeitintensivsten repetitiven Aufgaben</li><li>Zuerst fehleranfällige manuelle Prozesse automatisieren</li><li>Gut geeignet: Lead-Management, Social Posting, Rechnungen</li><li>Nicht geeignet: kreative Entscheidungen, komplexe Kundeninteraktionen</li></ul>'},
{id:"3-2",t:"n8n: Der Open-Source-Automatisierer",c:'<p><strong>n8n</strong> ist ein Open-Source-Workflow-Tool mit visueller Oberfläche. Besonderheit: <strong>self-hosted möglich</strong> (100% Datenkontrolle), native KI/LLM-Integration.</p><p><strong>Kernkonzepte:</strong> Nodes (App-Verbindungen), Connections (Verbindungen), Workflows (gespeicherte Automatisierungen), Executions (Ausführungsprotokoll).</p><h4>Wichtige Punkte</h4><ul class="kp"><li>400+ integrierte App-Integrationen</li><li>Self-hosted = DSGVO-freundlich (kein externer Datentransfer)</li><li>Error Trigger Node: Fehlerbehandlung immer einbauen</li><li>Günstiger als Make/Zapier bei hohem Task-Volumen</li><li>Einstieg: n8n Cloud (kostenlos bis 5 Workflows) oder Docker</li></ul><div class="pblock"><div class="plabel">KI-Node System Prompt (n8n)</div><pre class="pcode">Du bist ein Assistent, der Kundenanfragen kategorisiert.\nKategorien: [Support, Bestellung, Beschwerde, Allgemein]\nAntworte NUR mit der Kategorie, ohne Erlaeuterung.\n\nAnfrage: {{ $json.email_body }}</pre><button class="cpbtn" onclick="copyP(this)">Kopieren</button></div>'},
{id:"3-3",t:"Make (ehemals Integromat)",c:'<p>Make ist benutzerfreundlicher als n8n – besonders für Marketing-Teams ohne technischen Background. Echtzeit-Datenvorschau macht Debugging einfach.</p><p><strong>Schlüsselkonzepte:</strong> Szenarien (= Workflows), Module (= Nodes), Router (Verzweigungen), Aggregatoren, Iterator.</p><h4>Wichtige Punkte</h4><ul class="kp"><li>Kostenlos: 1.000 Operations/Monat (1 Op = 1 Modul-Ausführung)</li><li>5-Modul-Workflow × 200 Ausführungen = 1.000 Operations</li><li>Ideal für: E-Commerce, Social Media, Marketing</li><li>Live-Debugging: Szenarien im Test-Modus verfolgen</li><li>Starke Google/Meta-Integrationen</li></ul><div class="tipbox">Make hat vorgefertigte Templates für häufige Use Cases (Google Sheets → Slack, Typeform → CRM). Starte dort statt bei Null.</div>'},
{id:"3-4",t:"Zapier für Einsteiger",c:'<p>Zapier: zugänglichster Einstieg in Automatisierung. Kein technisches Wissen nötig, <strong>6.000+ App-Integrationen</strong>, geführte Workflow-Erstellung.</p><p>Ein <strong>"Zap"</strong> = ein Workflow. Multi-Step Zaps erlauben mehrere Aktionen. Paths (ab Pro) ermöglichen Verzweigungen.</p><h4>Wichtige Punkte</h4><ul class="kp"><li>100 Tasks/Monat kostenlos (1 Task = 1 erfolgreiche Ausführung)</li><li>Größtes App-Ökosystem (6.000+ Integrationen)</li><li>Ideal für Einsteiger und schnelles Prototyping</li><li>Teurer als n8n/Make bei hohem Volumen</li><li>Schwäche: weniger Flexibilität für komplexe Logik</li></ul>'},
{id:"3-5",t:"KI in Automatisierungen einbinden",c:'<p>Workflow-Automatisierung + KI = der eigentliche Gamechanger. Daten fließen automatisch → KI verarbeitet → Ergebnis wird weitergeleitet.</p><h4>3 Praxis-Use-Cases</h4><ul class="kp"><li><strong>Lead-Routing:</strong> Eingehende Anfrage → GPT kategorisiert + priorisiert → CRM-Eintrag + Slack-Benachrichtigung</li><li><strong>Täglicher Digest:</strong> RSS-Feed Konkurrenz → Claude fasst zusammen + bewertet Relevanz → Slack/E-Mail-Digest</li><li><strong>Personalisiertes Outreach:</strong> Neuer Lead im CRM → KI generiert personalisierte E-Mail → Freigabe → Versand</li></ul><h4>Wichtige Punkte</h4><ul class="kp"><li>n8n: OpenAI-Node direkt verfügbar, Claude via HTTP-Request</li><li>Make: OpenAI-Modul direkt integriert</li><li>Immer Human-in-the-Loop für kritische Entscheidungen</li><li>API-Kosten und Rate Limits einkalkulieren</li></ul>'},
],
quiz:[
{q:"Was ist das Grundprinzip der Workflow-Automatisierung?",o:["Manuell + Digital + Hybrid","Trigger → Bedingung → Aktion","Input → Output → Feedback","Plan → Execute → Review"],c:1,f:["Leider falsch.","Exakt! Trigger (was löst aus?) + Bedingung + Aktion(en) = universelles Automatisierungsprinzip.","Zu allgemein.","Das ist Projektmanagement."]},
{q:"Was ist der Hauptvorteil von n8n gegenüber Zapier?",o:["Mehr App-Integrationen","Einfachere Benutzeroberfläche","Self-Hosting für volle Datenkontrolle + günstiger bei hohem Volumen","Besserer 24/7-Support"],c:2,f:["Zapier hat mehr Integrationen.","Zapier ist benutzerfreundlicher.","Richtig! Open source, self-hostbar (DSGVO-konform), deutlich günstiger bei hohem Volumen.","n8n hat Community-Support."]},
{q:"Was bedeutet '1 Operation' bei Make?",o:["Ein komplettes Szenario","Eine Modul-Ausführung innerhalb eines Szenarios","Eine Stunde Laufzeit","Ein Datenbankzugriff"],c:1,f:["Ein Szenario = mehrere Operations.","Korrekt! Jede Modul-Ausführung = 1 Op. 5-Modul-Szenario × 200 Ausführungen = 1.000 Ops.","Nach Modul-Ausführungen gezählt, nicht Zeit.","Separat behandelt."]},
{q:"Für welches Szenario eignet sich Zapier am besten?",o:["100.000+ Tasks/Monat","DSGVO-kritisch, self-hosted","Schnelles Prototyping, Teams ohne technischen Background","Komplexe Logik mit Custom Code"],c:2,f:["Zapier wird bei hohem Volumen teuer.","Für DSGVO-kritisches ist n8n self-hosted besser.","Richtig! Einfachste Einstiegshürde, perfekt für Nicht-Techniker und Prototyping.","Für komplexe Logik ist n8n flexibler."]},
{q:"Was ist 'Human-in-the-Loop'?",o:["Permanent-Serverüberwachung durch Programmierer","Menschen werden in kritische KI-Entscheidungsschritte eingebunden","Nutzer tippt Daten manuell ein","KI lernt in Echtzeit von Feedback"],c:1,f:["Server-Monitoring ist etwas anderes.","Exakt! Bei kritischen Aktionen muss immer ein Mensch zustimmen können.","Dann keine Automatisierung.","Das ist Online Learning."]},
]},

{id:4,color:"#F87171",icon:"🔒",title:"DSGVO & Sicherer KI-Einsatz",sub:"Rechtssicherer KI-Einsatz im Unternehmen",
lessons:[
{id:"4-1",t:"DSGVO-Grundlagen für KI",c:'<p>Die <strong>DSGVO</strong> gilt für die Verarbeitung personenbezogener Daten von EU-Bürgern – auch bei KI-Diensten wie ChatGPT und Claude.</p><p><strong>Personenbezogene Daten</strong> = alle Informationen, die eine Person direkt oder indirekt identifizieren: Name, E-Mail, IP-Adresse, Standort, Kaufverhalten.</p><p>Wenn du Kundendaten in ChatGPT eingibst, wird OpenAI zum <strong>Auftragsverarbeiter</strong>. Das erfordert einen Auftragsverarbeitungsvertrag (AVV) mit EU-Standardvertragsklauseln.</p><h4>Wichtige Punkte</h4><ul class="kp"><li>DSGVO gilt für alle EU-Unternehmen und alle Verarbeiter von EU-Daten</li><li>Auftragsverarbeitungsvertrag (AVV) mit KI-Anbieter ist Pflicht</li><li>ChatGPT Enterprise und Claude for Work bieten DSGVO-konforme Optionen</li><li>Maximalbußgeld: 20 Mio. € oder 4% des weltweiten Jahresumsatzes</li></ul>'},
{id:"4-2",t:"Was darf in den Prompt?",c:'<p>Faustregel: Alles, was einer lebenden Person zugeordnet werden kann, braucht besondere Vorsicht.</p><h4>🔴 Rote Liste – nicht ohne DSGVO-Prüfung eingeben</h4><ul class="kp"><li>Vollständige Kundennamen mit Kontaktdaten</li><li>Gesundheits-, Finanz- oder Rechtsdaten</li><li>Interne Strategiepapiere und M&amp;A-Pläne</li><li>Zugangsdaten, API-Keys, Passwörter (niemals!)</li></ul><h4>🟢 Grüne Liste – sicher verwendbar</h4><ul class="kp"><li>Anonymisierte/aggregierte Daten</li><li>Öffentlich zugängliche Informationen</li><li>Eigene kreative Inhalte ohne Personenbezug</li><li>Allgemeine Geschäftsprozesse ohne spezifische Kundendaten</li></ul><div class="pblock"><div class="plabel">Anonymisierungs-Technik</div><pre class="pcode">VORHER (nicht eingeben):\n"Maria Mueller aus Frankfurt: unzufrieden mit Bestellung\n#12345 vom 15.01.2025..."\n\nNACHHER (sicher):\n"Kundin A aus [Stadt]: unzufrieden mit Bestellung\n#[ID] vom [Datum]..."</pre><button class="cpbtn" onclick="copyP(this)">Kopieren</button></div>'},
{id:"4-3",t:"Lokale vs. Cloud-Modelle",c:'<p><strong>Cloud-KI</strong> (ChatGPT, Claude, Gemini): Daten gehen an externe Server. Vorteile: Top-Modelle, kein Setup. Risiko: Datenweitergabe an US-Unternehmen.</p><p><strong>Lokale Modelle</strong> (Ollama, LM Studio): Modell läuft auf deiner Hardware. Keine Daten verlassen dein Netzwerk. 100% DSGVO-konform – aber schwächer als GPT-4/Claude.</p><h4>Empfohlene lokale Modelle</h4><ul class="kp"><li><strong>Llama 3</strong> (Meta): 8B/70B – sehr gute Allround-Performance</li><li><strong>Mistral</strong>: Europäisches Unternehmen (Paris!) – DSGVO-freundlicher</li><li><strong>Gemma</strong> (Google): Kompakt, effizient für Alltagsaufgaben</li><li><strong>Tool:</strong> Ollama (Terminal) oder LM Studio (grafische Oberfläche)</li></ul><div class="tipbox">Faustregel: Sensible Daten → lokale Modelle. Kreativaufgaben → Cloud-KI. Enterprise-Versionen mit AVV für den sicheren Mittelweg.</div>'},
{id:"4-4",t:"KI-Policy für dein Unternehmen",c:'<p>Eine <strong>KI-Policy</strong> ist ein internes Regelwerk für den sicheren KI-Einsatz. Schützt das Unternehmen rechtlich und gibt Mitarbeitern Sicherheit.</p><h4>Kernelemente einer KI-Policy</h4><ul class="kp"><li>Erlaubte Tools und Versionen (z.B. nur ChatGPT Enterprise mit AVV)</li><li>Verbotene Anwendungsfälle (z.B. keine Kundendaten ohne AVV)</li><li>Kennzeichnungspflicht für KI-generierte Inhalte</li><li>Vier-Augen-Prinzip für kritische KI-Outputs</li><li>Schulungspflichten für alle Mitarbeiter</li><li>Meldepflicht bei Datenpannen (72h-Frist!)</li></ul><h4>Prozess</h4><ul class="kp"><li>Policy erstellen → Datenschutzbeauftragten/Anwalt prüfen lassen</li><li>Betriebsrat einbinden → Mitarbeiter schulen</li><li>Jährlich aktualisieren (KI-Recht entwickelt sich schnell!)</li></ul>'},
{id:"4-5",t:"Haftung, Urheberrecht & EU AI Act",c:'<p><strong>Haftung:</strong> Nach deutschem Recht haftet das Unternehmen, das KI einsetzt. Falsche Analysen, fehlerhafte Verträge – Verantwortung liegt beim Nutzer.</p><p><strong>Urheberrecht:</strong> KI-generierter Content ist in Deutschland nicht automatisch geschützt. Eigener substanzieller Beitrag muss nachweisbar sein.</p><p><strong>EU AI Act</strong> (ab 2026): Verboten → Hochrisiko (Kreditvergabe, Einstellung) → Begrenztes Risiko (Chatbots) → Minimales Risiko (Spam-Filter).</p><h4>Wichtige Punkte</h4><ul class="kp"><li>Haftung liegt immer beim menschlichen/unternehmerischen Nutzer</li><li>EU AI Act: Kennzeichnungspflicht für KI-Content (ab 2026)</li><li>Chatbots müssen sich als KI zu erkennen geben</li><li>Hochrisiko-KI unterliegt strengen Anforderungen</li><li>Typische Christel Media-Anwendungen: "begrenztes Risiko"</li></ul>'},
],

{q:"Was ist ein Auftragsverarbeitungsvertrag (AVV)?",o:["Ein Freelancer-Vertrag","Vertrag der regelt, wie ein Dienstleister Daten im Auftrag verarbeiten darf","Eine interne HR-Vereinbarung","Ein EU-Zertifikat für Datensicherheit"],c:1,f:["Kein Freelancer-Vertrag.","Exakt! Gesetzlich vorgeschrieben, wenn externe Dienstleister personenbezogene Daten verarbeiten.","Externer Vertrag, nicht intern.","Vertrag, kein Zertifikat."]},
{q:"Was ist der Hauptvorteil lokaler KI-Modelle?",o:["Schneller als Cloud-Modelle","Mehr Funktionen als GPT-4","Keine Daten verlassen das eigene Netzwerk – 100% DSGVO-konform","Kostenlos und werbefinanziert"],c:2,f:["Lokale Modelle sind oft langsamer.","Qualitativ aktuell schwächer als GPT-4/Claude.","Korrekt! Alle Daten bleiben auf deiner Hardware – maximale Datenkontrolle.","Nicht werbefinanziert."]},
{q:"Was regelt der EU AI Act?",o:["Preise für KI-Dienste in Europa","Risikobasiertes System zur Regulierung von KI nach Anwendungsbereich","Ausbildung von KI-Experten","WLAN-Standards für KI-Hardware"],c:1,f:["Keine Preisregulierung.","Richtig! EU AI Act: Klassifizierung nach Risikograd mit entsprechenden Anforderungen.","Ausbildungsstandards separat.","Technische Standards separat."]},

{id:5,color:"#A78BFA",icon:"🎯",title:"Maßgeschneiderter Workshop",sub:"Branchenspezifische KI-Strategien für dein Unternehmen",
lessons:[
{id:"5-1",t:"KI im Kundenservice",c:'<p>KI transformiert Kundenservice: <strong>(1) Self-Service</strong> durch Chatbots und <strong>(2) Mitarbeiter-Augmentation</strong> durch KI-Assistenten im Hintergrund.</p><p><strong>Chatbot-Stufenmodell:</strong> FAQ-Bot → Informationsbot → Transaktionsbot (Bestellungen/Retouren) → Agentic Bot. Für KMU ist <strong>Stufe 2–3</strong> optimal.</p><h4>Wichtige Punkte</h4><ul class="kp"><li>70% der Kundenanfragen sind wiederholend und automatisierbar</li><li>Immer: klarer Eskalationspfad zu menschlichen Agenten</li><li>Chatbots müssen sich als KI zu erkennen geben (EU AI Act)</li><li>Tools: Custom GPTs (ab ChatGPT Plus), Intercom AI, Freshdesk Freddy</li></ul><div class="pblock"><div class="plabel">System Prompt für Kundenservice-Bot</div><pre class="pcode">Du bist [Unternehmensname]-Assistent.\n\nWISSEN: [Produktkatalog], [Rueckgaberichtlinien],\n[Lieferzeiten und Versandoptionen]\n\nREGELN:\n1. Antworte immer auf Deutsch\n2. Freundlich und loesungsorientiert\n3. Unbekannte Fragen: "Ich verbinde dich mit unserem Team."\n4. Als KI-Assistent vorstellen, wenn gefragt\n5. KEINE Preisnachlaesse ohne Ruecksprache</pre><button class="cpbtn" onclick="copyP(this)">Kopieren</button></div>'},
{id:"5-2",t:"KI-gestützte Lead-Generierung",c:'<p>KI macht Lead-Generierung skalierbarer. Die drei Hebel: <strong>(1) Zielgruppen-Identifikation</strong>, <strong>(2) Personalisierte Ansprache</strong>, <strong>(3) Lead Scoring</strong>.</p><h4>Tools-Stack für KI-Leadgen</h4><ul class="kp"><li><strong>LinkedIn Sales Navigator + Clay.com:</strong> Zielgruppen-Mining und Datenanreicherung</li><li><strong>Apollo.io:</strong> Kontaktdaten + KI-gestütztes Outreach</li><li><strong>ChatGPT/Claude:</strong> Personalisierung auf Basis von LinkedIn-Profilen</li><li><strong>n8n:</strong> Automatisierung des gesamten Prozesses</li></ul><h4>Wichtige Punkte</h4><ul class="kp"><li>Personalisierung erhöht Response-Raten um bis zu 300%</li><li>DSGVO gilt auch für B2B-Kaltakquise – Opt-out immer einbauen</li><li>Qualität schlägt Quantität: 100 relevante > 10.000 Spam-Mails</li><li>Lead Scoring: Firmengröße + Tech-Stack + Kaufsignale kombinieren</li></ul>'},
{id:"5-3",t:"Content-Pipelines für Marketing-Teams",c:'<p>Eine Content-Pipeline automatisiert von Ideenfindung bis Veröffentlichung. Mit KI + Automatisierung: Ein-Personen-Marketing mit 5-Team-Kapazität.</p><h4>Beispiel-Pipeline (vollautomatisiert bis auf Freigabe)</h4><ul class="kp"><li><strong>Schritt 1:</strong> Wöchentlich 10 Ideen via KI (Trends, Keywords, Wettbewerb)</li><li><strong>Schritt 2:</strong> Template-Briefing automatisch befüllen</li><li><strong>Schritt 3:</strong> KI-Entwurf für Blog + Social Snippets + Newsletter</li><li><strong>Schritt 4:</strong> Menschliche Freigabe (15 Min. statt 2 Std.)</li><li><strong>Schritt 5:</strong> Automatisch in Buffer/Hootsuite einplanen</li><li><strong>Schritt 6:</strong> Wöchentlicher KI-Performance-Report</li></ul><div class="tipbox">Ein Brand-Voice-Dokument ist essenziell für konsistenten KI-Output. Beschreibe Stil, Tonalität, was du nie sagst – und füge 3 Beispieltexte hinzu.</div>'},
{id:"5-4",t:"Interne Wissensdatenbanken mit KI (RAG)",c:'<p><strong>RAG (Retrieval Augmented Generation):</strong> KI durchsucht eure eigenen Dokumente beim Antworten. Statt teures Fine-Tuning: relevante Information wird beim Generieren "nachgeschlagen".</p><p><strong>Einfach erklärt:</strong> Mitarbeiter fragt KI → KI durchsucht eure Dokumente → antwortet auf Basis eurer eigenen Daten.</p><h4>Tools für KMU</h4><ul class="kp"><li><strong>Notion AI:</strong> Q&amp;A direkt auf deine Notion-Wissensdatenbank</li><li><strong>Guru:</strong> Wissensmanagement mit KI für Support-Teams</li><li><strong>Confluence AI:</strong> Für Atlassian-Nutzer (Jira, Trello)</li><li><strong>Custom via n8n + Pinecone + Claude API:</strong> Volle Kontrolle</li></ul><h4>Anwendungsfälle</h4><ul class="kp"><li>Mitarbeiter-Onboarding: "Wie ist unsere Urlaubsregelung?"</li><li>Sales: "Welche Case Studies haben wir für FinTech-Kunden?"</li><li>Support: "Was steht in unseren AGBs zur Garantie?"</li></ul>'},
{id:"5-5",t:"Dein persönlicher KI-Aktionsplan",c:'<p>Alle 5 Module abgeschlossen – jetzt geht es um Umsetzung. Ein <strong>90-Tage-Plan</strong> gibt dir Struktur.</p><h4>🚀 Woche 1–2: Quick Wins</h4><ul class="kp"><li>Custom Instructions in ChatGPT einrichten (30 Min.)</li><li>10 Prompt-Vorlagen für häufigste Aufgaben erstellen</li><li>Erste E-Mails und Inhalte mit KI-Unterstützung erstellen</li></ul><h4>📅 Monat 1: Fundament</h4><ul class="kp"><li>Prompt-Bibliothek mit dem Team teilen</li><li>DSGVO-Check: welche Daten gehen in welche Tools?</li><li>Einfachsten manuellen Prozess automatisieren</li></ul><h4>📈 Monat 2–3: Skalieren</h4><ul class="kp"><li>2–3 vollständige Workflows automatisiert</li><li>KI-Policy im Unternehmen eingeführt</li><li>Regelmäßige Team-Sessions zur KI-Optimierung</li></ul><div class="tipbox">Nächste Schritte mit Christel Media: Kostenloses 30-Min. Strategiegespräch → maßgeschneiderter Workshop → Umsetzungsbegleitung. Kontakt: hallo@christel.media</div>'},
],

{q:"Was ist der wichtigste Bestandteil eines Kundenservice-Chatbots?",o:["Möglichst viele Funktionen","Integration mit allen Social Media Kanälen","Klarer Eskalationspfad zu menschlichen Agenten","Multilinguale Unterstützung in 20+ Sprachen"],c:2,f:["Viele Funktionen machen Chatbots oft komplizierter.","Nice-to-have, aber nicht entscheidend.","Richtig! Kein Bot löst alles. Ein klarer Weg zum menschlichen Agenten ist essenziell.","Sprachen wichtig, aber nicht wichtigstes Element."]},
{q:"Was erhöht Response-Raten bei KI-gestützter Lead-Generierung am stärksten?",o:["Höhere Versandfrequenz","Personalisierung basierend auf LinkedIn-Profil und Company News","Kürzere E-Mails unter 50 Wörtern","Mehr CC-Empfänger"],c:1,f:["Höhere Frequenz führt zu mehr Spam-Markierungen.","Korrekt! Relevante Personalisierung steigert Response-Raten um bis zu 300%.","Kürze allein reicht nicht – Relevanz entscheidet.","Mehr CC-Empfänger wirken unprofessionell."]},
{q:"Was sollte in Woche 1 zuerst getan werden?",o:["Vollständiges KI-Automatisierungssystem aufbauen","Custom Instructions einrichten und 10 Prompt-Vorlagen erstellen","Alle Mitarbeiter gleichzeitig schulen","Neues CRM implementieren"],c:1,f:["Zu ambitioniert für Woche 1.","Richtig! Quick Wins: Custom Instructions + Prompt-Bibliothek. Sofortige Wirkung, minimaler Aufwand.","Große Schulungen brauchen mehr Vorbereitung.","CRM-Implementierungen sind mehrstufige Projekte."]},
{q:"Warum ist eine Content-Pipeline wertvoll?",o:["Sie ersetzt das Marketing-Team","Automatisiert von Ideenfindung bis Veröffentlichung – 70%+ Zeitersparnis","Garantiert viralen Content","Nur für Unternehmen mit 100+ Mitarbeitern"],c:1,f:["Pipeline ersetzt keine Menschen.","Exakt! Von Idee bis Publish: statt 3 Tagen nur 4 Stunden. Ein-Personen-Marketing mit 5-Team-Kapazität.","Viralität hängt von Inhalt und Timing ab.","Für KMU besonders wertvoll."]},

const SK="christelmedia_ki_v1";
let ST={done:new Set(),scores:{}};
let curMod=null;
let QS={qi:0,ans:[],mod:null};

function loadST(){try{const r=localStorage.getItem(SK);if(r){const d=JSON.parse(r);ST.done=new Set(d.done||[]);ST.scores=d.scores||{}}}catch(e){}}
function saveST(){localStorage.setItem(SK,JSON.stringify({done:[...ST.done],scores:ST.scores}))}

function renderSidebar(){
  const nav=document.getElementById("sidebarNav");
  let html="";
  MODS.forEach(m=>{
    const total=m.lessons.length;
    const done=m.lessons.filter(l=>ST.done.has(l.id)).length;
    const pct=total>0?done/total:0;
    const off=(C2PI-(pct*C2PI)).toFixed(2);
    const act=curMod===m.id;
    html+=`<button class="mod-btn${act?" active":""}" onclick="selMod(${m.id})" style="border-left-color:${act?m.color:"transparent"}">
      <div class="ring-wrap"><svg width="38" height="38" viewBox="0 0 38 38">
        <circle class="ring-bg" cx="19" cy="19" r="14"/>
        <circle class="ring-fg" cx="19" cy="19" r="14" stroke="${m.color}" stroke-dasharray="${C2PI.toFixed(2)}" stroke-dashoffset="${off}"/>
      </svg><div class="ring-num" style="color:${m.color}">${m.id}</div></div>
      <div class="mod-info"><div class="mod-title">${m.title}</div><div class="mod-meta">${done}/${total} Lektionen</div></div>
    </button>`;
  });
  nav.innerHTML=html;
  const tl=MODS.reduce((s,m)=>s+m.lessons.length,0);
  const dl=ST.done.size;
  document.getElementById("overallFill").style.width=(tl>0?dl/tl*100:0)+"%";
  document.getElementById("overallCount").textContent=dl+" / "+tl+" Lektionen";
}

function renderWelcome(){
  let html='<div class="welcome"><div class="welcome-hero">KI</div><h1>Willkommen in der KI Academy</h1><p>Fünf Module. Praxisnahes Wissen. Sofort anwendbar.</p><div class="welcome-cards">';
  MODS.forEach(m=>{
    const done=m.lessons.filter(l=>ST.done.has(l.id)).length;
    const full=done===m.lessons.length&&done>0;
    html+=`<div class="wcard" onclick="selMod(${m.id})" style="${full?"border-color:"+m.color:""}">
      <div class="wcard-icon">${m.icon}</div>
      <div class="wcard-num" style="${full?"color:"+m.color:""}">Modul ${m.id}</div>
      <div class="wcard-title">${m.title}</div></div>`;
  });
  html+="</div></div>";
  document.getElementById("content").innerHTML=html;
}

function selMod(id){
  curMod=id;renderSidebar();
  const m=MODS.find(x=>x.id===id);
  renderMod(m);
  if(window.innerWidth<=768){document.getElementById("sidebar").classList.remove("open");document.getElementById("overlay").classList.remove("show")}
  document.getElementById("main").scrollTop=0;
}

function renderMod(m){
  const done=m.lessons.filter(l=>ST.done.has(l.id)).length;
  const pct=m.lessons.length>0?done/m.lessons.length*100:0;
  const qs=ST.scores[m.id];
  let html=`<div class="module-view"><div class="mod-hero" style="border-color:${m.color}28">
    <div class="hero-num" style="color:${m.color}">${String(m.id).padStart(2,"0")}</div>
    <div class="hero-badge" style="background:${m.color}18;color:${m.color}">${m.icon} Modul ${m.id}</div>
    <div class="hero-title">${m.title}</div>
    <div class="hero-sub">${m.sub}</div>
    <div class="hero-meta">
      <span>📚 ${m.lessons.length} Lektionen</span>
      <span id="dcnt">✅ ${done} abgeschlossen</span>
      <span>🎯 ${qs!==undefined?"Quiz: "+qs+"/5":"Quiz verfügbar"}</span>
    </div>
    <div class="mod-pbar"><div class="mod-pfill" id="mpf" style="width:${pct}%;background:${m.color}"></div></div>
  </div>
  <div class="sec-label">Lektionen</div><div id="llist">`;
  m.lessons.forEach((l,i)=>{
    const d=ST.done.has(l.id);
    html+=`<div class="lcard${d?" done":""}" id="lc-${l.id}">
      <div class="lcard-hdr" onclick="togL('${l.id}')">
        <div class="lnum">${i+1}</div>
        <div class="ltitle">${l.t}</div>
        <div class="lcheck">✓</div>
        <div class="lchevron">▼</div>
      </div>
      <div class="lbody"><div class="lcontent">${l.c}
        <button class="donebt" onclick="togD('${l.id}',event)">${d?"✓ Abgeschlossen":"○ Als abgeschlossen markieren"}</button>
      </div></div>
    </div>`;
  });
  html+=`</div>
  <div class="quiz-sec">
    <div class="quiz-hdr"><div class="qz-icon">🎯</div>
      <div><div class="qz-h2">Modul ${m.id} Quiz</div>
      <div class="qz-desc">5 Fragen · Teste dein Wissen${qs!==undefined?" · Letztes Ergebnis: "+qs+"/5":""}</div></div>
    </div>
    <div id="qcont"></div>
  </div></div>`;
  document.getElementById("content").innerHTML=html;
  if(ST.scores[m.id]!==undefined){document.getElementById("qcont").innerHTML=buildRes(m,ST.scores[m.id])}
  else{startQ(m)}
}

function togL(lid){
  const c=document.getElementById("lc-"+lid);
  const was=c.classList.contains("open");
  document.querySelectorAll(".lcard.open").forEach(x=>x.classList.remove("open"));
  if(!was)c.classList.add("open");
}

function togD(lid,e){
  e.stopPropagation();
  if(ST.done.has(lid)){ST.done.delete(lid)}else{ST.done.add(lid)}
  saveST();renderSidebar();
  const c=document.getElementById("lc-"+lid);
  if(c){
    const d=ST.done.has(lid);
    c.classList.toggle("done",d);
    const b=c.querySelector(".donebt");
    if(b)b.textContent=d?"✓ Abgeschlossen":"○ Als abgeschlossen markieren";
  }
  const m=MODS.find(x=>x.id===curMod);
  if(m){
    const d=m.lessons.filter(l=>ST.done.has(l.id)).length;
    const f=document.getElementById("mpf");if(f)f.style.width=(m.lessons.length>0?d/m.lessons.length*100:0)+"%";
    const dc=document.getElementById("dcnt");if(dc)dc.textContent="✅ "+d+" abgeschlossen";
  }
}

function startQ(m){QS={qi:0,ans:[],mod:m};renderQ()}

function renderQ(){
  const {qi,mod:m}=QS;const q=m.quiz[qi];const L=["A","B","C","D"];
  let dots="";for(let i=0;i<m.quiz.length;i++)dots+=`<div class="qdot${i<qi?" done":i===qi?" cur":""}"></div>`;
  let opts="";q.o.forEach((op,i)=>{opts+=`<button class="qopt" id="qo${i}" onclick="ansQ(${i})"><span class="oletter">${L[i]}</span>${op}</button>`;});
  document.getElementById("qcont").innerHTML=`<div class="qcard">
    <div class="qdots">${dots}</div>
    <div class="qnum">Frage ${qi+1} von ${m.quiz.length}</div>
    <div class="qtext">${q.q}</div>
    <div class="qopts">${opts}</div>
    <div class="qfb" id="qfb"></div>
    <button class="qnxt" id="qnxt" onclick="nxtQ()">${qi<m.quiz.length-1?"Nächste Frage →":"Ergebnis anzeigen →"}</button>
  </div>`;
}

function ansQ(i){
  const q=QS.mod.quiz[QS.qi];const ok=i===q.c;QS.ans.push(ok);
  document.querySelectorAll(".qopt").forEach((b,j)=>{b.disabled=true;if(j===q.c)b.classList.add("correct");else if(j===i&&!ok)b.classList.add("wrong")});
  const fb=document.getElementById("qfb");fb.textContent=q.f[i];fb.className="qfb show "+(ok?"ok":"nope");
  document.getElementById("qnxt").classList.add("show");
}

function nxtQ(){
  QS.qi++;
  if(QS.qi>=QS.mod.quiz.length){
    const score=QS.ans.filter(Boolean).length;
    ST.scores[QS.mod.id]=score;saveST();renderSidebar();
    document.getElementById("qcont").innerHTML=buildRes(QS.mod,score);
  }else{renderQ()}
}

function buildRes(m,score){
  const stars=["⭐","⭐⭐","⭐⭐⭐","⭐⭐⭐⭐","⭐⭐⭐⭐⭐"][Math.min(score,5)-1]||"";
  const msgs=["Weiter üben – Lektionen nochmal durchlesen.","Fast – noch ein paar Details!","Gut! Noch ein paar Details nachlesen.","Sehr gut! Du hast das Thema verstanden.","Perfekt! 5/5 – Absolute Top-Performance!"];
  const nxtBtn=curMod<5?`<button class="qnxt show" onclick="selMod(${curMod+1})">Nächstes Modul →</button>`:'<div style="color:var(--accent);font-family:Syne,sans-serif;font-weight:700;margin-top:12px">🎉 Alle Module abgeschlossen!</div>';
  return `<div class="qcard qresult">
    <div class="rscore" style="color:${m.color}">${score}/5</div>
    <div class="rstars">${stars}</div>
    <div class="rlabel">${msgs[score-1]||"Weiter üben!"}</div>
    <button class="retrybt" onclick="startQ(MODS.find(x=>x.id===${m.id}))">Quiz wiederholen</button>
    ${nxtBtn}
  </div>`;
}

function copyP(btn){
  const pre=btn.previousElementSibling;
  const text=pre.textContent;
  if(navigator.clipboard){navigator.clipboard.writeText(text).then(()=>{btn.textContent="✓ Kopiert!";btn.classList.add("ok");setTimeout(()=>{btn.textContent="Kopieren";btn.classList.remove("ok")},2000)})}
  else{const s=window.getSelection(),r=document.createRange();r.selectNodeContents(pre);s.removeAllRanges();s.addRange(r);document.execCommand("copy");s.removeAllRanges();btn.textContent="✓ Kopiert!";btn.classList.add("ok");setTimeout(()=>{btn.textContent="Kopieren";btn.classList.remove("ok")},2000)}
}

function toggleSidebar(){document.getElementById("sidebar").classList.toggle("open");document.getElementById("overlay").classList.toggle("show")}

loadST();renderSidebar();renderWelcome();
</script>
